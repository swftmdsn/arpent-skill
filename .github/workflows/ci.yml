name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Python ${{ matrix.python }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, python: "3.9"}
          - {os: ubuntu-latest, python: "3.10"}
          - {os: ubuntu-latest, python: "3.11"}
          - {os: ubuntu-latest, python: "3.12"}
          - {os: ubuntu-latest, python: "3.13"}
          - {os: ubuntu-latest, python: "3.14"}
          - {os: macos-latest, python: "3.12"}
          - {os: windows-latest, python: "3.12"}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Tests, offline benchmark validation, and baseline gate
        run: python tests/run.py all

  release:
    name: Wheel Python ${{ matrix.python }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, python: "3.9"}
          - {os: ubuntu-latest, python: "3.12"}
          - {os: macos-latest, python: "3.12"}
          - {os: windows-latest, python: "3.12"}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install ".[dev]"
      - name: Offline wheel install in an isolated venv
        env:
          PIP_NO_INDEX: "1"
        run: python tests/run.py release

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install ".[dev]"
      - name: Coverage
        run: coverage run tests/run.py all
      - run: coverage report
